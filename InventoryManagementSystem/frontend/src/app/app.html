<div class="admin-layout" *ngIf="authService.isLoggedIn()">
  <app-navbar></app-navbar>

  <div class="admin-main">
    <header class="d-flex justify-content-between align-items-center p-3 bg-white border-bottom shadow-sm">
      <h5 class="mb-0 text-muted d-none d-md-block fw-semibold" style="letter-spacing: -0.5px;">Inventory Portal</h5>
      <div class="d-flex align-items-center gap-3">
        <div class="d-flex align-items-center bg-light px-3 py-1 rounded-pill border">
          <i class="bi bi-person-circle fs-5 me-2 text-primary"></i>
          <span class="fw-medium text-dark">Admin</span>
        </div>
      </div>
    </header>

    <div class="admin-content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
