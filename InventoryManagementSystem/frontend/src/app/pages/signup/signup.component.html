<!-- Sign-Up Page -->
<div class="auth-page d-flex justify-content-center align-items-center">
  <div class="auth-card premium-card p-0" style="width: 100%; max-width: 440px;">

    <!-- Card Header -->
    <div class="text-center px-5 pt-5 pb-3">
      <div class="auth-icon-wrap bg-primary bg-opacity-10 rounded-circle d-inline-flex justify-content-center align-items-center mb-3" style="width:64px;height:64px;">
        <i class="bi bi-person-plus-fill text-primary fs-2"></i>
      </div>
      <h4 class="fw-bold mb-1">Create Account</h4>
      <p class="text-muted small mb-0">Sign up to start managing your inventory</p>
    </div>

    <!-- Divider -->
    <hr class="mx-4 mt-0" />

    <!-- Success Message -->
    <div *ngIf="successMessage" class="alert alert-success d-flex align-items-center mx-4 mb-0 border-0" role="alert">
      <i class="bi bi-check-circle-fill me-2"></i>
      {{ successMessage }}
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="alert alert-danger d-flex align-items-center mx-4 mb-0 border-0" role="alert">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>
      {{ errorMessage }}
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" #signupForm="ngForm" class="px-5 py-4">

      <!-- Username -->
      <div class="mb-3">
        <label class="form-label-custom">Username <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0 text-muted">
            <i class="bi bi-person"></i>
          </span>
          <input
            type="text"
            class="form-control-custom border-start-0 ps-0"
            name="username"
            [(ngModel)]="username"
            required
            minlength="3"
            maxlength="50"
            placeholder="Choose a unique username"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label-custom">Password <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0 text-muted">
            <i class="bi bi-lock"></i>
          </span>
          <input
            type="password"
            class="form-control-custom border-start-0 ps-0"
            name="password"
            [(ngModel)]="password"
            required
            minlength="6"
            placeholder="Minimum 6 characters"
          />
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="mb-4">
        <label class="form-label-custom">Confirm Password <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0 text-muted">
            <i class="bi bi-lock-fill"></i>
          </span>
          <input
            type="password"
            class="form-control-custom border-start-0 ps-0"
            [class.border-danger]="passwordMismatch"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            required
            placeholder="Re-enter your password"
          />
        </div>
        <div *ngIf="passwordMismatch" class="text-danger small mt-1">
          <i class="bi bi-exclamation-circle me-1"></i> Passwords do not match.
        </div>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        class="btn btn-primary-custom w-100 py-2 d-flex justify-content-center align-items-center"
        [disabled]="signupForm.invalid || isLoading || passwordMismatch"
      >
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        {{ isLoading ? 'Creating Account...' : 'Create Account' }}
      </button>

      <!-- Link to login -->
      <p class="text-center text-muted small mt-4 mb-0">
        Already have an account?
        <a routerLink="/login" class="text-primary fw-medium text-decoration-none">Sign in</a>
      </p>

    </form>
  </div>
</div>
