<div class="mb-4">
  <div class="d-flex align-items-center mb-1">
    <a routerLink="/categories" class="text-muted text-decoration-none me-2"><i class="bi bi-arrow-left"></i></a>
    <h3 class="fw-bold mb-0">{{ isEditMode ? 'Edit Category' : 'Create Category' }}</h3>
  </div>
  <p class="text-muted ms-4 ps-1 mb-0">{{ isEditMode ? 'Update existing classification' : 'Add a new classification to organize products' }}</p>
</div>

<div *ngIf="errorMessage" class="alert alert-danger d-flex align-items-center border-0 shadow-sm" role="alert">
  <i class="bi bi-exclamation-octagon-fill text-danger fs-5 me-2"></i>
  <div class="flex-grow-1">{{ errorMessage }}</div>
</div>

<div class="premium-card" style="max-width: 600px;">
  <div class="premium-card-body">
    <form (ngSubmit)="onSubmit()" #categoryForm="ngForm">
      
      <div class="mb-4">
        <label for="categoryName" class="form-label-custom">Category Name <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0 text-muted">
            <i class="bi bi-tag"></i>
          </span>
          <input
            type="text"
            class="form-control-custom border-start-0 ps-0"
            id="categoryName"
            name="categoryName"
            [(ngModel)]="categoryName"
            required
            maxlength="100"
            placeholder="e.g. Electronics, Furniture..."
          />
        </div>
        <div *ngIf="categoryForm.submitted && !categoryName" class="text-danger small mt-1">
          <i class="bi bi-exclamation-circle me-1"></i> Category name is required.
        </div>
      </div>

      <div class="d-flex gap-2 pt-2 border-top mt-4 pt-3">
        <button type="submit" class="btn btn-primary-custom px-4 d-flex align-items-center" [disabled]="categoryForm.invalid || isLoading">
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status"></span>
          <i *ngIf="!isLoading" class="bi bi-check2-circle me-2"></i> {{ isLoading ? 'Saving...' : (isEditMode ? 'Update Category' : 'Save Category') }}
        </button>
        <a routerLink="/categories" class="btn btn-light-custom px-4 text-decoration-none">Cancel</a>
      </div>
      
    </form>
  </div>
</div>
