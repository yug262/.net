<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h3 class="fw-bold mb-1">Categories</h3>
    <p class="text-muted mb-0">Manage your product classifications</p>
  </div>
  <a routerLink="/categories/add" class="btn btn-primary-custom text-decoration-none d-flex align-items-center">
    <i class="bi bi-plus-lg me-2"></i> Add Category
  </a>
</div>

<div *ngIf="message" class="alert alert-success d-flex align-items-center border-0 shadow-sm" role="alert">
  <i class="bi bi-check-circle-fill text-success fs-5 me-2"></i>
  <div class="flex-grow-1">{{ message }}</div>
  <button type="button" class="btn-close" (click)="message = ''"></button>
</div>

<div *ngIf="isLoading" class="d-flex justify-content-center py-5">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
</div>

<div class="premium-card" *ngIf="!isLoading">
  <div class="table-responsive">
    <table class="table-premium">
      <thead>
        <tr>
          <th style="width: 80px;">ID</th>
          <th>Category Name</th>
          <th>Created Date</th>
          <th class="text-end" style="width: 150px;">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let cat of categories; let i = index">
          <td class="text-muted">#{{ cat.id }}</td>
          <td class="fw-medium">{{ cat.categoryName }}</td>
          <td class="text-muted small">
            <i class="bi bi-calendar3 me-1"></i> {{ cat.createdAt | date:'mediumDate' }}
          </td>
          <td class="text-end">
            <a [routerLink]="['/categories/edit', cat.id]" class="btn btn-sm btn-light-custom me-2" title="Edit">
              <i class="bi bi-pencil-square text-primary"></i>
            </a>
            <button class="btn btn-sm btn-light-custom text-danger" (click)="deleteCategory(cat.id)" title="Delete">
              <i class="bi bi-trash3"></i>
            </button>
          </td>
        </tr>
        
        <!-- Empty State -->
        <tr *ngIf="categories.length === 0">
          <td colspan="4" class="text-center py-5">
            <div class="text-muted d-flex flex-column align-items-center">
              <i class="bi bi-inbox fs-1 mb-3 text-secondary opacity-50"></i>
              <h5 class="fw-medium">No Categories Found</h5>
              <p class="small mb-0">Get started by creating your first product category.</p>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
